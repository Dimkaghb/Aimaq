services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build: .
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis
    command: celery -A app.tasks.scraping.celery worker --loglevel=info

  celery-beat:
    build: .
    env_file: .env
    volumes:
      - .:/app
    depends_on:
      - redis
    command: celery -A app.tasks.scraping.celery beat --loglevel=info

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
